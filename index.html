<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Solar Pro Enhanced</title>
<script src="https://unpkg.com/vue@3"></script>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }
input, select { margin:5px; }
</style>
</head>
<body>

<div id="app">

<div class="card">
<h2>⚙️ System</h2>
Solar kW: <input v-model.number="solarKw">
Battery kWh: <input v-model.number="batteryKwh">
Rate: <input v-model.number="rate">
</div>

<div class="card">
<h2>🔌 Appliances</h2>
<div v-for="(a,i) in appliances" :key="i">
<input v-model="a.name">
<input v-model.number="a.power"> W
<input v-model.number="a.hours"> h
<select v-model="a.time">
<option value="day">Day</option>
<option value="night">Night</option>
<option value="all">All</option>
</select>
<select v-model="a.type">
<option value="ac_inverter">AC</option>
<option value="ev">EV</option>
<option value="general">General</option>
</select>
</div>
<button @click="addAppliance">+ Add</button>
</div>

<div class="card">
<h2>📊 Results</h2>
Solar Used: {{res.solarUsed.toFixed(1)}} kWh<br>
Grid Import: {{res.grid.toFixed(1)}} kWh<br>
Savings: {{res.savings.toFixed(0)}} ฿<br>
Reliance: {{res.reliance.toFixed(1)}} %
</div>

<div class="card">
<h2>⚡ EV Optimization</h2>
Best Start: {{ev.start}}:00
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
solarKw:5,
batteryKwh:0,
rate:4.65,
appliances:[
{ name:"AC", power:15000, hours:10, time:"night", type:"ac_inverter"},
{ name:"EV", power:6700, hours:3, time:"day", type:"ev"},
{ name:"Other", power:800, hours:12, time:"all", type:"general"}
]
}
},
computed:{
res(){ return this.simulate(); },
ev(){ return this.optimizeEV(); }
},
methods:{

getKW(a){ return a.type.includes('ac') ? a.power/15/1000 : a.power/1000; },

loadFactor(a){
if(a.type==='ac_inverter') return 0.6;
return 1;
},

isActive(a,h){
if(a.time==='day') return h>=8 && h<=17;
if(a.time==='night') return h<=6 || h>=19;
return true;
},

simulate(){

const solarProfile=[0,0,0,0,0.05,0.15,0.35,0.6,0.8,0.95,1,1,0.95,0.85,0.7,0.5,0.3,0.15,0.05,0,0,0,0,0];

let solarPeak=this.solarKw*0.9;
let battery=0;

let solarUsed=0, grid=0, totalLoad=0;

for(let d=0; d<30; d++){
for(let h=0; h<24; h++){

let solarGen=solarProfile[h]*solarPeak;

let load=0;
this.appliances.forEach(a=>{
if(this.isActive(a,h)){
load+=this.getKW(a)*this.loadFactor(a)*(a.hours/24);
}
});

totalLoad+=load;

let use=Math.min(load,solarGen);
let remain=load-use;
let excess=solarGen-use;

if(this.batteryKwh>0){
let charge=Math.min(excess,this.batteryKwh-battery);
battery+=charge*0.95;
excess-=charge;

let discharge=Math.min(battery,remain);
battery-=discharge;
use+=discharge;
remain-=discharge;
}

solarUsed+=use;
grid+=remain;

}
}

return{
solarUsed,
grid,
savings:solarUsed*this.rate,
reliance:(solarUsed/totalLoad)*100
};
},

optimizeEV(){
const solarProfile=[0,0,0,0,0.05,0.15,0.35,0.6,0.8,0.95,1,1,0.95,0.85,0.7,0.5,0.3,0.15,0.05,0,0,0,0,0];

let best=0, bestScore=-999;

for(let h=0;h<21;h++){
let score=0;
for(let i=0;i<3;i++){
score+=solarProfile[h+i];
}
if(score>bestScore){ bestScore=score; best=h; }
}

return {start:best};
},

addAppliance(){
this.appliances.push({name:'New',power:1000,hours:1,time:'all',type:'general'});
}

}

}).mount('#app');
</script>

</body>
</html>
